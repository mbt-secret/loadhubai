<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0a12" />
    <title>TIRGo offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0b0a12;
        color: #fff;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: radial-gradient(circle at top, rgba(124, 107, 255, 0.22), transparent 42%), #0b0a12;
      }

      main {
        width: min(100%, 360px);
        text-align: center;
      }

      .mark {
        width: 72px;
        height: 72px;
        margin: 0 auto 18px;
        display: grid;
        place-items: center;
        border-radius: 22px;
        background: linear-gradient(135deg, #6d5df6, #25d366);
        font-weight: 800;
        letter-spacing: 0.03em;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.55rem;
      }

      p {
        margin: 0;
        color: #b8b3cc;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">LH</div>
      <h1>Esti offline</h1>
      <p>TIRGo are nevoie de internet pentru sincronizarea curselor si notificarilor.</p>
    </main>
  </body>
</html>
